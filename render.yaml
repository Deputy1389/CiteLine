# Render Blueprint – deploy with "New > Blueprint" at dashboard.render.com
# Docs: https://docs.render.com/blueprint-spec

services:
  # API Web Service
  - type: web
    name: linecite-api
    runtime: docker
    repo: https://github.com/Deputy1389/CiteLine.git
    branch: main
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - fromGroup: linecite-shared-env
      - key: PORT
        value: "8000"
      - key: CORS_ALLOW_ORIGINS
        value: https://linecite.com,https://linecite-website.vercel.app
      - key: ALLOWED_HOSTS
        value: api.linecite.com,linecite-api.onrender.com
    healthCheckPath: /health

  # Cron Job (FREE worker alternative)
  - type: cron
    name: linecite-worker-cron
    runtime: docker
    repo: https://github.com/Deputy1389/CiteLine.git
    branch: main
    dockerfilePath: ./Dockerfile
    dockerCommand: python -m apps.worker.runner_once
    schedule: "*/5 * * * *"
    envVars:
      - fromGroup: linecite-shared-env
      - key: DISABLE_OCR
        value: "false"
      - key: OCR_MODE
        value: "full"
      - key: OCR_DPI
        value: "200"

envGroups:
  - name: linecite-shared-env
    envVars:
      - key: DATABASE_URL
        placeholder: "Paste your Supabase URL here"
      - key: DATA_DIR
        value: /tmp/citeline_data
      - key: PYTHONPATH
        value: /app
